<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css"></head><body data-theme="light">
<div class="card" style="background:#f0ebe2;padding:24px">
  <div class="t-section" style="margin-bottom:14px">Inputs · input always L0, sits inside L2 card</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div>
      <div style="font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#7a6b5d;margin-bottom:6px">Default</div>
      <input style="width:100%;height:32px;padding:0 10px;background:#f7f4ee;border:1px solid #d9d1c5;border-radius:6px;font:400 13px Geist;color:#3d2b1f" value="Astana Agro Holding" />
    </div>
    <div>
      <div style="font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#7a6b5d;margin-bottom:6px">Focus</div>
      <input style="width:100%;height:32px;padding:0 10px;background:#f7f4ee;border:1px solid #c4baa8;border-radius:6px;font:400 13px Geist;color:#3d2b1f;box-shadow:0 0 0 3px rgba(61,43,31,0.06);outline:none" value="Астана" />
    </div>
    <div>
      <div style="font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#7a6b5d;margin-bottom:6px">Disabled</div>
      <input disabled style="width:100%;height:32px;padding:0 10px;background:#e3ddd2;border:1px solid #e6e0d6;border-radius:6px;font:400 13px Geist;color:#a69a8c;opacity:0.6" value="" placeholder="Readonly" />
    </div>
    <div>
      <div style="font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#c0392b;margin-bottom:6px">Error</div>
      <input style="width:100%;height:32px;padding:0 10px;background:#f7f4ee;border:1px solid #c0392b;border-radius:6px;font:400 13px Geist;color:#3d2b1f" value="" />
      <div style="font-size:11px;color:#c0392b;margin-top:4px">⚠ ИИН обязателен</div>
    </div>
  </div>
</div></body></html>
