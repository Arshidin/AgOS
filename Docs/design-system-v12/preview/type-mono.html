<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css"></head><body>
<div class="card" style="background:#141312;padding:28px">
  <div class="t-section" style="margin-bottom:16px;color:#686460">Geist Mono · numerals & code</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
    <div>
      <div style="font-family:'Geist Mono',monospace;font-variant-numeric:tabular-nums;font-size:13px;font-weight:500;color:#e6e2dc;line-height:1.7">
        $45,200.00<br>$128,000.00<br>$67,500.00<br>$234,000.00
      </div>
      <div style="font-family:'Geist',sans-serif;font-size:10px;color:#686460;margin-top:10px;letter-spacing:0.06em;text-transform:uppercase">Tabular · value column</div>
    </div>
    <div>
      <div style="font-family:'Geist Mono',monospace;font-size:11px;color:#9e9890;line-height:1.8">
        <span style="color:#686460">const</span> <span style="color:#e6e2dc">stage</span> = <span style="color:#5ec47a">"active"</span><br>
        <span style="color:#686460">//</span> <span style="color:#686460">status: green</span><br>
        <span style="color:#e6e2dc">fetch</span>(<span style="color:#f0b040">`/api/farm/${id}`</span>)
      </div>
      <div style="font-family:'Geist',sans-serif;font-size:10px;color:#686460;margin-top:10px;letter-spacing:0.06em;text-transform:uppercase">Code · kbd · IDs</div>
    </div>
  </div>
</div></body></html>
