<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  body { margin: 0; background: #f0ebe2; font-family: Geist, sans-serif; color: #3d2b1f; -webkit-font-smoothing: antialiased; }
  .card { background: transparent; padding: 24px; }

  /* ── Record card (L2 on L0) ──────────────────────────────── */
  .rc {
    background: #fbf9f3;
    border: 1px solid #e0d6c4;
    border-radius: 12px;
    box-shadow:
      0 0 0 1px rgba(61,43,31,0.01),
      0 1px 2px rgba(61,43,31,0.04),
      0 8px 24px -8px rgba(61,43,31,0.10);
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────────────────── */
  .rc-head {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center; gap: 14px;
    padding: 16px 18px 14px;
    border-bottom: 1px solid #ebe4d4;
  }
  .rc-mark {
    width: 44px; height: 44px; border-radius: 10px;
    background: linear-gradient(145deg, #ede5d8 0%, #e3d9c5 100%);
    display: grid; place-items: center;
    font: 600 14px Geist; color: #3d2b1f;
    border: 1px solid #d9cfbb;
    letter-spacing: -0.02em;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset;
  }
  .rc-meta { min-width: 0; }
  .rc-crumbs {
    font: 400 10.5px Geist; color: #a69a8c;
    display: flex; align-items: center; gap: 5px;
    letter-spacing: 0.01em;
  }
  .rc-crumbs .sep { color: #c4baa8; }
  .rc-title {
    display: flex; align-items: center; gap: 8px;
    font: 600 15px Geist; color: #3d2b1f; letter-spacing: -0.015em;
    margin-top: 3px; line-height: 1.2;
  }
  .rc-type {
    font: 600 9.5px Geist; letter-spacing: 0.08em; text-transform: uppercase;
    color: #7a6b5d; background: #ede5d8; padding: 3px 7px 2px;
    border-radius: 4px; line-height: 1.2;
    border: 1px solid #e0d6c4;
  }

  .rc-actions { display: flex; align-items: center; gap: 4px; }
  .icb {
    width: 28px; height: 28px; display: grid; place-items: center;
    background: transparent; border: 1px solid transparent; cursor: pointer;
    color: #a69a8c; border-radius: 6px; transition: all 80ms;
  }
  .icb:hover { background: #ede5d8; color: #3d2b1f; }
  .icb.star { color: #E8920B; }

  /* ── Fields — tighter rhythm, clearer grid ───────────────── */
  .rc-fields { padding: 6px 10px 8px; }
  .row {
    display: grid;
    grid-template-columns: 96px 1fr auto;
    align-items: center; gap: 14px;
    padding: 8px 10px;
    border-radius: 6px;
    transition: background 80ms;
    min-height: 30px;
  }
  .row:hover { background: #f2ebd9; }
  .lbl {
    font: 500 10.5px Geist; letter-spacing: 0.02em;
    color: #a69a8c;
  }
  .val { font: 400 13px Geist; color: #3d2b1f; line-height: 1.4; }
  .val.mono { font-family: 'Geist Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: -0.01em; }

  .edit-hint {
    font: 500 10px 'Geist Mono', monospace;
    color: #c4baa8;
    padding: 2px 5px; border-radius: 3px;
    opacity: 0; transition: opacity 80ms;
    border: 1px solid #e0d6c4; background: #fbf9f3;
    line-height: 1;
  }
  .row:hover .edit-hint { opacity: 1; }

  .dot { width: 5px; height: 5px; border-radius: 9999px; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 9px 2px 7px;
    border-radius: 9999px; font: 500 11px Geist;
    line-height: 1.5;
  }
  .badge-green { color: #3a8a52; background: rgba(58,138,82,0.10); }

  /* Multi-value pills for collaborators */
  .people { display: inline-flex; align-items: center; gap: 5px; }
  .person {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px 2px 2px; background: #ede5d8;
    border-radius: 9999px; border: 1px solid #e0d6c4;
    font: 500 11px Geist; color: #3d2b1f;
  }
  .av-xs {
    width: 16px; height: 16px; border-radius: 9999px;
    font: 600 8.5px Geist; display: grid; place-items: center;
    letter-spacing: -0.02em;
  }
  .person .more {
    font: 500 11px Geist; color: #a69a8c; padding: 0 2px;
  }

  /* ── Footer ──────────────────────────────────────────────── */
  .rc-foot {
    display: flex; align-items: center; gap: 0;
    padding: 10px 18px; background: #f2ebd9;
    border-top: 1px solid #ebe4d4;
    font: 400 11px Geist; color: #7a6b5d;
  }
  .rc-foot > * + *::before {
    content: ""; width: 1px; height: 10px; background: #d9cfbb;
    display: inline-block; margin: 0 12px; vertical-align: middle;
  }
  .foot-item {
    display: inline-flex; align-items: center; gap: 5px;
  }
  .foot-id {
    margin-left: auto;
    font: 500 10.5px 'Geist Mono', monospace;
    color: #a69a8c; letter-spacing: -0.01em;
  }
  .foot-id .hash { color: #c4baa8; }
</style>
</head><body>
<div class="card">
  <div class="rc">
    <!-- HEADER -->
    <div class="rc-head">
      <div class="rc-mark">АД</div>
      <div class="rc-meta">
        <div class="rc-crumbs">
          <span>Фермы</span>
          <span class="sep">/</span>
          <span>Акмолинская обл.</span>
          <span class="sep">/</span>
          <span style="color:#7a6b5d">Алтын Дала</span>
        </div>
        <div class="rc-title">
          ТОО «Алтын Дала»
          <span class="rc-type">Ферма</span>
        </div>
      </div>
      <div class="rc-actions">
        <button class="icb star" title="В избранном">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2Z"/></svg>
        </button>
        <button class="icb" title="Ещё">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
      </div>
    </div>

    <!-- FIELDS -->
    <div class="rc-fields">
      <div class="row">
        <span class="lbl">БИН</span>
        <span class="val mono">000840001234</span>
        <span class="edit-hint">⌘E</span>
      </div>
      <div class="row">
        <span class="lbl">Регион</span>
        <span class="val">Акмолинская область · Аршалы</span>
        <span class="edit-hint">⌘E</span>
      </div>
      <div class="row">
        <span class="lbl">Площадь</span>
        <span class="val mono">1 240 га</span>
        <span class="edit-hint">⌘E</span>
      </div>
      <div class="row">
        <span class="lbl">Специалисты</span>
        <span class="val">
          <span class="people">
            <span class="person"><span class="av-xs" style="background:#c9a079;color:#3d2b1f">АК</span>Арман К.</span>
            <span class="person"><span class="av-xs" style="background:#b89068;color:#f7f4ee">СН</span>Сауле Н.</span>
            <span class="more">+2</span>
          </span>
        </span>
        <span class="edit-hint">⌘E</span>
      </div>
      <div class="row">
        <span class="lbl">Статус</span>
        <span class="val"><span class="badge badge-green"><span class="dot" style="background:#3a8a52"></span>Активна</span></span>
        <span class="edit-hint"></span>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="rc-foot">
      <span class="foot-item">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Обновлено 2 дн назад
      </span>
      <span class="foot-item">Создано 15 мар 2026</span>
      <span class="foot-id">
        <span class="hash">#</span>farm_4a8b
      </span>
    </div>
  </div>
</div>
</body></html>
