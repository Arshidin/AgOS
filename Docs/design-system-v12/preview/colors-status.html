<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  body { background:#f6f3ed; }
  .card {
    background:#f6f3ed; padding:22px 24px;
    font-family:'Geist',sans-serif; color:#3d2b1f;
  }
  .head {
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom: 16px;
  }
  .head .t {
    font: 600 12px 'Geist', sans-serif;
    color: #3d2b1f; letter-spacing: -0.005em;
  }
  .head .sub {
    font: 500 10px 'Geist Mono', monospace;
    color: #9a9288;
  }

  .grp-title {
    font: 600 9.5px 'Geist', sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9a9288;
    margin: 0 0 8px;
  }
  .grp + .grp { margin-top: 16px; }

  /* Status row — one row per status, 3 presentations */
  .status-row {
    display:grid;
    grid-template-columns: 130px 1fr 1fr 1fr;
    align-items:center;
    gap: 12px;
    padding: 10px 12px;
    background: #fbfaf6;
    border: 1px solid #e6dfd2;
    border-radius: 8px;
  }
  .status-row + .status-row { margin-top: 6px; }

  .id {
    display:flex; align-items:center; gap:8px;
  }
  .id .swatch {
    width: 18px; height: 18px;
    border-radius: 5px;
    position: relative;
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.06),
      inset 0 1px 0 rgba(255,255,255,0.35),
      0 1px 2px rgba(61,43,31,0.12);
  }
  .id .lbl {
    font: 600 11.5px 'Geist',sans-serif;
    color:#3d2b1f;
    letter-spacing:-0.005em;
  }
  .id .hex {
    font: 500 9.5px 'Geist Mono',monospace;
    color:#9a9288;
    margin-top: 1px;
  }
  .id-text { display:flex; flex-direction:column; }

  /* Dot + label chip — Linear/Attio style */
  .dot-chip {
    display:inline-flex; align-items:center; gap:7px;
    padding: 3px 10px 3px 8px;
    border-radius: 9999px;
    background: #fbfaf6;
    border: 1px solid #e6dfd2;
    font: 500 11px 'Geist',sans-serif;
    color:#3d352c;
    width: fit-content;
  }
  .dot-chip .dot {
    width:7px; height:7px; border-radius:9999px;
    position: relative;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.6);
  }
  .dot-chip .dot::after {
    content:''; position:absolute; inset:0;
    border-radius: inherit;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.35);
  }

  /* Tinted pill — subtle tint + dot + colored text */
  .tint-pill {
    display:inline-flex; align-items:center; gap:6px;
    padding: 2px 9px 2px 7px;
    border-radius: 9999px;
    font: 600 10.5px 'Geist',sans-serif;
    letter-spacing: 0.005em;
    width: fit-content;
  }
  .tint-pill .dot {
    width:6px; height:6px; border-radius:9999px;
  }

  /* Rail — colored bar + label, feels current (Vercel logs) */
  .rail {
    display:inline-flex; align-items:center; gap:8px;
    padding: 3px 10px 3px 3px;
    border-radius: 6px;
    background: #fbfaf6;
    border: 1px solid #eadfcb;
    font: 500 11px 'Geist',sans-serif;
    color: #3d352c;
    width: fit-content;
  }
  .rail .bar {
    width: 3px; height: 14px;
    border-radius: 2px;
    margin-left: 3px;
  }
</style>
</head><body data-theme="light">
<div class="card">

  <div class="head">
    <div class="t">Semantic status · Light</div>
    <div class="sub">3 chip variants · modern, layered</div>
  </div>

  <div class="grp">
    <div class="grp-title">Tokens × presentations</div>

    <!-- GREEN -->
    <div class="status-row">
      <div class="id">
        <div class="swatch" style="background:linear-gradient(180deg,#4ea268,#3a8a52);"></div>
        <div class="id-text"><div class="lbl">green</div><div class="hex">#3A8A52</div></div>
      </div>
      <div class="dot-chip"><span class="dot" style="background:#3a8a52"></span>Active</div>
      <div class="tint-pill" style="background:rgba(58,138,82,0.10);color:#2f6e42;box-shadow:inset 0 0 0 1px rgba(58,138,82,0.22);">
        <span class="dot" style="background:#3a8a52;box-shadow:0 0 0 2px rgba(58,138,82,0.18)"></span>Active
      </div>
      <div class="rail"><span class="bar" style="background:linear-gradient(180deg,#4ea268,#2f6e42);"></span>Active</div>
    </div>

    <!-- BLUE -->
    <div class="status-row">
      <div class="id">
        <div class="swatch" style="background:linear-gradient(180deg,#5e86c7,#4571b8);"></div>
        <div class="id-text"><div class="lbl">blue</div><div class="hex">#4571B8</div></div>
      </div>
      <div class="dot-chip"><span class="dot" style="background:#4571b8"></span>Qualified</div>
      <div class="tint-pill" style="background:rgba(69,113,184,0.10);color:#355996;box-shadow:inset 0 0 0 1px rgba(69,113,184,0.22);">
        <span class="dot" style="background:#4571b8;box-shadow:0 0 0 2px rgba(69,113,184,0.18)"></span>Qualified
      </div>
      <div class="rail"><span class="bar" style="background:linear-gradient(180deg,#5e86c7,#355996);"></span>Qualified</div>
    </div>

    <!-- EMERALD -->
    <div class="status-row">
      <div class="id">
        <div class="swatch" style="background:linear-gradient(180deg,#3ea489,#2d8a6e);"></div>
        <div class="id-text"><div class="lbl">emerald</div><div class="hex">#2D8A6E</div></div>
      </div>
      <div class="dot-chip"><span class="dot" style="background:#2d8a6e"></span>Won</div>
      <div class="tint-pill" style="background:rgba(45,138,110,0.10);color:#206b55;box-shadow:inset 0 0 0 1px rgba(45,138,110,0.22);">
        <span class="dot" style="background:#2d8a6e;box-shadow:0 0 0 2px rgba(45,138,110,0.18)"></span>Won
      </div>
      <div class="rail"><span class="bar" style="background:linear-gradient(180deg,#3ea489,#206b55);"></span>Won</div>
    </div>

    <!-- AMBER -->
    <div class="status-row">
      <div class="id">
        <div class="swatch" style="background:linear-gradient(180deg,#d19230,#b37a10);"></div>
        <div class="id-text"><div class="lbl">amber</div><div class="hex">#B37A10</div></div>
      </div>
      <div class="dot-chip"><span class="dot" style="background:#b37a10"></span>Lead</div>
      <div class="tint-pill" style="background:rgba(179,122,16,0.10);color:#8c5f0c;box-shadow:inset 0 0 0 1px rgba(179,122,16,0.25);">
        <span class="dot" style="background:#b37a10;box-shadow:0 0 0 2px rgba(179,122,16,0.18)"></span>Lead
      </div>
      <div class="rail"><span class="bar" style="background:linear-gradient(180deg,#d19230,#8c5f0c);"></span>Lead</div>
    </div>

    <!-- RED -->
    <div class="status-row">
      <div class="id">
        <div class="swatch" style="background:linear-gradient(180deg,#d15142,#c0392b);"></div>
        <div class="id-text"><div class="lbl">red</div><div class="hex">#C0392B</div></div>
      </div>
      <div class="dot-chip"><span class="dot" style="background:#c0392b"></span>Stalled</div>
      <div class="tint-pill" style="background:rgba(192,57,43,0.09);color:#9b2d22;box-shadow:inset 0 0 0 1px rgba(192,57,43,0.22);">
        <span class="dot" style="background:#c0392b;box-shadow:0 0 0 2px rgba(192,57,43,0.18)"></span>Stalled
      </div>
      <div class="rail"><span class="bar" style="background:linear-gradient(180deg,#d15142,#9b2d22);"></span>Stalled</div>
    </div>

  </div>

</div>
</body></html>
