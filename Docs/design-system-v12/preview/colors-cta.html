<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css"></head><body>
<div class="card" style="padding:0;width:700px;background:transparent">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--bd)">
    <div style="padding:24px;background:#f0ebe2">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#a69a8c;margin-bottom:14px">CTA · light</div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <button style="height:32px;padding:0 14px;border-radius:6px;background:#3d2b1f;color:#faf8f4;border:0;font-family:Geist,sans-serif;font-size:12px;font-weight:600;letter-spacing:-0.01em;cursor:pointer">+ Add contact</button>
        <button style="height:32px;padding:0 14px;border-radius:6px;background:transparent;color:#7a6b5d;border:1px solid #d9d1c5;font-family:Geist,sans-serif;font-size:11px;font-weight:500;cursor:pointer">Filter</button>
      </div>
      <div style="font-family:'Geist Mono',monospace;font-size:10px;color:#7a6b5d">bg:#3d2b1f · fg:#faf8f4 · hover:#2c1e14</div>
    </div>
    <div style="padding:24px;background:#141312">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#686460;margin-bottom:14px">CTA · dark</div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <button style="height:32px;padding:0 14px;border-radius:6px;background:#e6e2dc;color:#141312;border:0;font-family:Geist,sans-serif;font-size:12px;font-weight:600;letter-spacing:-0.01em;cursor:pointer">+ Add contact</button>
        <button style="height:32px;padding:0 14px;border-radius:6px;background:transparent;color:#9e9890;border:1px solid #302e2a;font-family:Geist,sans-serif;font-size:11px;font-weight:500;cursor:pointer">Filter</button>
      </div>
      <div style="font-family:'Geist Mono',monospace;font-size:10px;color:#686460">bg:#e6e2dc · fg:#141312 · hover:#f0ebe2</div>
    </div>
  </div>
</div></body></html>
