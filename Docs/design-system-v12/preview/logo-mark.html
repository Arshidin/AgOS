<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  body { margin: 0; background: #f0ebe2; font-family: Geist, sans-serif; color: #3d2b1f; -webkit-font-smoothing: antialiased; }
  .card { background: transparent; padding: 28px 30px; display: grid; grid-template-columns: 1fr 1px 1fr; gap: 28px; align-items: center; }
  .divider { width: 1px; background: #d9d1c5; height: 100%; }

  .stack { display: flex; flex-direction: column; gap: 14px; }
  .label { font: 600 10px Geist; letter-spacing: 0.08em; text-transform: uppercase; color: #a69a8c; }

  .lockup-full { display: inline-flex; align-items: center; }
  .lockup-full svg { height: 44px; width: auto; display: block; }
  .lockup-full .mark { fill: #E8920B; }
  .lockup-full .word { fill: #3d2b1f; }

  .lockup-mark { display: inline-flex; align-items: center; gap: 12px; }
  .lockup-mark .big { height: 56px; width: 56px; }
  .lockup-mark .big path { fill: #E8920B; }
  .lockup-mark .meta { display: flex; flex-direction: column; gap: 2px; }
  .lockup-mark .meta .name { font: 600 15px Geist; letter-spacing: -0.015em; color: #3d2b1f; }
  .lockup-mark .meta .sub { font: 400 11px Geist; color: #7a6b5d; }

  .swatch-row { display: inline-flex; align-items: center; gap: 10px; }
  .dot {
    width: 18px; height: 18px; border-radius: 9999px; background: #E8920B;
    border: 1px solid rgba(61,43,31,0.08);
  }
  .mono { font-family: 'Geist Mono', monospace; font-size: 11px; color: #7a6b5d; letter-spacing: -0.01em; }
</style>
