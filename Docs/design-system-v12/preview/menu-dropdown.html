<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  body { margin: 0; background: #f0ebe2; font-family: Geist, sans-serif; color: #3d2b1f; }
  .card { background: transparent; padding: 22px; display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: flex-start; }

  /* ── Dropdown menu ───────────────────────────────────────── */
  .menu-wrap { position: relative; }
  .anchor {
    display: inline-flex; align-items: center; gap: 6px; height: 28px;
    padding: 0 10px; background: #f7f4ee; border: 1px solid #d9d1c5;
    border-radius: 6px; font: 500 12px Geist; color: #3d2b1f;
    box-shadow: 0 1px 0 rgba(61,43,31,0.02);
  }
  .anchor .ch { color: #a69a8c; }

  .menu {
    margin-top: 6px;
    width: 240px;
    background: #fbf9f3;
    border: 1px solid #d9d1c5;
    border-radius: 10px;
    padding: 4px;
    box-shadow:
      0 0 0 1px rgba(61,43,31,0.02),
      0 1px 2px rgba(61,43,31,0.04),
      0 12px 28px -6px rgba(61,43,31,0.14);
    position: relative;
  }
  .menu::before {
    content: ""; position: absolute; top: -5px; left: 18px;
    width: 8px; height: 8px; background: #fbf9f3;
    border-top: 1px solid #d9d1c5; border-left: 1px solid #d9d1c5;
    transform: rotate(45deg);
  }
  .menu-section {
    font: 600 10px Geist; letter-spacing: 0.06em; text-transform: uppercase;
    color: #a69a8c; padding: 8px 10px 4px;
  }
  .mi {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 6px; cursor: pointer;
    color: #3d2b1f; font: 400 13px Geist; position: relative;
  }
  .mi .ico { color: #a69a8c; flex-shrink: 0; }
  .mi .lbl { flex: 1; }
  .mi .kk { color: #a69a8c; }
  .mi.on { background: #ede5d8; color: #3d2b1f; }
  .mi.on .ico { color: #3d2b1f; }
  .mi.on::before {
    content: ""; position: absolute; left: 0; top: 7px; bottom: 7px;
    width: 2px; border-radius: 2px; background: #3d2b1f;
  }
  .mi.sub::after {
    content: ""; width: 10px; height: 10px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a69a8c' stroke-width='1.8' stroke-linecap='round'><path d='m9 6 6 6-6 6'/></svg>") center/contain no-repeat;
  }
  .mi.danger { color: #c0392b; }
  .mi.danger .ico { color: #c0392b; }
  .mdiv { height: 1px; background: #e6e0d6; margin: 4px 6px; }

  /* ── kbd ─────────────────────────────────────────────────── */
  .kbd {
    display: inline-flex; align-items: center; height: 18px; padding: 0 5px;
    font: 500 10px 'Geist Mono', monospace; color: #7a6b5d;
    background: #f0ebe2;
    border: 1px solid #d9d1c5;
    border-bottom-width: 2px; border-radius: 4px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset;
    line-height: 1;
  }

  .kbd-row { display: inline-flex; align-items: center; gap: 6px; }
  .kbd-sep { color: #c4baa8; font-size: 11px; }

  /* ── tabs ────────────────────────────────────────────────── */
  .tabs {
    display: inline-flex; flex-wrap: nowrap; gap: 0; padding: 3px; background: #ede5d8;
    border: 1px solid #e0d6c4; border-radius: 7px; max-width: 100%;
  }
  .tab {
    padding: 4px 10px; border-radius: 5px; border: 0; cursor: pointer;
    font: 500 12px Geist; color: #a69a8c; background: transparent;
    display: inline-flex; align-items: center; gap: 6px; height: 24px;
    transition: all 80ms; white-space: nowrap;
  }
  .tab .cnt {
    font: 500 10px 'Geist Mono', monospace; color: #a69a8c;
    padding: 1px 5px; border-radius: 4px; background: rgba(61,43,31,0.05);
  }
  .tab.on {
    background: #fbf9f3; color: #3d2b1f;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 1px 2px rgba(61,43,31,0.06);
  }
  .tab.on .cnt { background: #ede5d8; color: #3d2b1f; }

  /* anchor tabs (underline style) */
  .atabs { display: inline-flex; gap: 20px; border-bottom: 1px solid #e6e0d6; padding: 0 2px; }
  .atab {
    padding: 6px 0; border: 0; background: transparent; cursor: pointer;
    font: 500 12px Geist; color: #a69a8c; position: relative; line-height: 1.5;
  }
  .atab.on { color: #3d2b1f; }
  .atab.on::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -1px;
    height: 2px; background: #3d2b1f; border-radius: 2px;
  }

  h4 {
    font: 600 10px Geist; letter-spacing: 0.06em; text-transform: uppercase;
    color: #a69a8c; margin: 0 0 10px;
  }
  .col { display: flex; flex-direction: column; gap: 18px; }
</style>
</head><body>
<div class="card">
  <!-- ── Context menu ── -->
  <div>
    <div class="menu-wrap">
      <button class="anchor">
        Сортировка
        <svg class="ch" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="menu">
        <div class="menu-section">Сортировать по</div>
        <div class="mi on">
          <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 7h13M3 12h9M3 17h5M17 8l3-3 3 3M20 5v14"/></svg>
          <span class="lbl">Имя · А → Я</span>
          <span class="kk"><span class="kbd">⌘↑</span></span>
        </div>
        <div class="mi">
          <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span class="lbl">Дата обновления</span>
        </div>
        <div class="mi sub">
          <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3Z"/></svg>
          <span class="lbl">Статус</span>
        </div>
        <div class="mdiv"></div>
        <div class="mi danger">
          <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
          <span class="lbl">Сбросить</span>
          <span class="kbd">⌫</span>
        </div>
      </div>
    </div>
  </div>

  <div class="col">
    <!-- ── Tabs ── -->
    <div>
      <h4>Segmented tabs</h4>
      <div class="tabs">
        <button class="tab on">Все <span class="cnt">248</span></button>
        <button class="tab">Активные <span class="cnt">214</span></button>
        <button class="tab">Модерация <span class="cnt">12</span></button>
        <button class="tab">Архив</button>
      </div>
    </div>

    <div>
      <h4>Underline tabs · record view</h4>
      <div class="atabs">
        <button class="atab on">Обзор</button>
        <button class="atab">Активность</button>
        <button class="atab">Документы</button>
        <button class="atab">Заметки</button>
      </div>
    </div>

    <!-- ── Kbd ── -->
    <div>
      <h4>Keyboard</h4>
      <div class="kbd-row" style="gap:14px">
        <span class="kbd-row"><span class="kbd">⌘</span><span class="kbd-sep">+</span><span class="kbd">K</span><span style="margin-left:6px;font:400 11px Geist;color:#7a6b5d">Command palette</span></span>
        <span class="kbd-row"><span class="kbd">⌘</span><span class="kbd-sep">+</span><span class="kbd">B</span><span style="margin-left:6px;font:400 11px Geist;color:#7a6b5d">Toggle sidebar</span></span>
        <span class="kbd-row"><span class="kbd">Esc</span><span style="margin-left:6px;font:400 11px Geist;color:#7a6b5d">Close overlay</span></span>
      </div>
    </div>
  </div>
</div>
</body></html>
