<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  body { margin: 0; background: #f6f3ed; font-family: Geist, sans-serif; -webkit-font-smoothing: antialiased; }
  .card { padding: 20px; background: #f6f3ed; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .pane {
    padding: 26px 24px;
    border-radius: 10px;
    display: flex; flex-direction: column; gap: 16px;
    position: relative;
  }
  .pane.light { background: #fbfaf6; border: 1px solid #e6dfd2; }
  .pane.dark  { background: #0e0d0c; border: 1px solid #2a2825; }

  .row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 0; align-items: center; }
  .row-split > div { display:flex; align-items:center; }
  .row-split > div + div { justify-content:flex-end; }

  /* Stacked lockup */
  .stacked { display:flex; align-items:center; justify-content:center; }
  .stacked svg { height: 40px; width: auto; display: block; }

  /* Horizontal lockup: icon left + wordmark right */
  .horiz {
    display: inline-flex; align-items: center;
    gap: 12px;
  }
  .horiz .icon { height: 32px; width: 32px; display:block; flex-shrink:0; }
  .horiz .wm   { height: 20px; width: auto; display:block; }

  /* Larger horizontal variant */
  .horiz.lg .icon { height: 44px; width: 44px; }
  .horiz.lg .wm   { height: 26px; }

  /* Compact horizontal — smaller icon paired with smaller wordmark */
  .horiz.sm .icon { height: 22px; width: 22px; }
  .horiz.sm .wm   { height: 14px; }

  .meta {
    display: flex; align-items: center; gap: 10px;
    font: 400 10px 'Geist Mono', monospace;
  }
  .pane.light .meta { color: #9a9288; }
  .pane.dark  .meta { color: #706a63; }
  .meta .tag {
    font: 600 9.5px Geist; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 7px 2px; border-radius: 4px; line-height: 1.2;
  }
  .pane.light .meta .tag { background: #f3ede1; color: #6b6359; border: 1px solid #e6dfd2; }
  .pane.dark  .meta .tag { background: #1d1c1a; color: #a8a29a; border: 1px solid #2a2825; }

  .sec-title {
    font: 600 9.5px Geist; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .pane.light .sec-title { color: #9a9288; }
  .pane.dark  .sec-title { color: #706a63; }

  .divider {
    height: 1px; width: 100%;
  }
  .pane.light .divider { background: #ece5d6; }
  .pane.dark  .divider { background: #2a2825; }

  .lbl-inline {
    font: 500 10px 'Geist Mono', monospace;
  }
  .pane.light .lbl-inline { color: #9a9288; }
  .pane.dark  .lbl-inline { color: #706a63; }
</style>
